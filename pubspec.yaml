name: bakatiket
description: "Bakatiket - Billetterie événementielle Congo (Pointe-Noire & Brazzaville)"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # QR Code
  qr_flutter: ^4.1.0

  # HTTP & Utils
  http: ^1.2.2
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/
