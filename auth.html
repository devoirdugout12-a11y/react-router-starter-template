<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Bakatiket - Billetterie Congo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/neon-congo.css">
    <link rel="stylesheet" href="css/auth-neon.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00FF88',
                        secondary: '#6C3EE8',
                        dark: '#0D0D1A',
                        surface: '#16162B',
                    }
                }
            }
        }
    </script>
</head>
<body class="auth-bg min-h-screen flex items-center justify-center p-6">

    <!-- Background Particles -->
    <div class="floating-particles" id="particles"></div>

    <div class="auth-card w-full max-w-md rounded-3xl p-8 animate-slide-up relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-black neon-text tracking-tighter">BAKA🎟️TIKET</a>
            <p class="text-text-secondary text-sm mt-2">La billetterie 100% Congo 🇨🇬</p>
        </div>

        <!-- Navigation par onglets -->
        <div class="flex justify-between mb-8 border-b border-white/5">
            <button onclick="switchTab('login')" id="tab-login" class="tab-btn active text-sm pb-3 px-2">CONNEXION</button>
            <button onclick="switchTab('signup')" id="tab-signup" class="tab-btn text-sm pb-3 px-2">INSCRIPTION</button>
            <button onclick="switchTab('reset')" id="tab-reset" class="tab-btn text-sm pb-3 px-2">RÉINITIALISER</button>
        </div>

        <!-- FORMULAIRE : CONNEXION -->
        <form id="login-form" class="space-y-5">
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Email ou +242...</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-primary/50 text-sm"></i>
                    <input type="text" id="login-email" required placeholder="votre@email.com" 
                        class="neon-input w-full pl-11 pr-4 py-3 rounded-xl outline-none text-sm">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Mot de passe</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-primary/50 text-sm"></i>
                    <input type="password" id="login-pass" required placeholder="••••••••" 
                        class="neon-input w-full pl-11 pr-4 py-3 rounded-xl outline-none text-sm">
                </div>
            </div>
            <div class="flex items-center justify-between text-xs">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked class="rounded border-white/10 text-primary bg-dark">
                    <span class="text-text-secondary">Se souvenir de moi</span>
                </label>
                <a href="javascript:switchTab('reset')" class="text-primary hover:underline">Oublié ?</a>
            </div>
            <button type="submit" class="neon-btn w-full py-4 rounded-xl mt-4">
                ACCÉDER À BAKATIKET
            </button>
        </form>

        <!-- FORMULAIRE : INSCRIPTION -->
        <form id="signup-form" class="space-y-5 hidden">
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Nom Complet</label>
                <input type="text" id="signup-name" required placeholder="Jean Bakatiket" 
                    class="neon-input w-full px-4 py-3 rounded-xl outline-none text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Téléphone (+242)</label>
                <input type="tel" id="signup-phone" required placeholder="06 444 88 92" 
                    class="neon-input w-full px-4 py-3 rounded-xl outline-none text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Email</label>
                <input type="email" id="signup-email" required placeholder="votre@email.com" 
                    class="neon-input w-full px-4 py-3 rounded-xl outline-none text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Mot de passe (8+)</label>
                <input type="password" id="signup-pass" required placeholder="••••••••" 
                    class="neon-input w-full px-4 py-3 rounded-xl outline-none text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Je suis un...</label>
                <div class="grid grid-cols-2 gap-3 mt-1">
                    <button type="button" onclick="selectRole('client')" id="role-client" 
                        class="role-btn active border border-white/10 py-3 rounded-xl text-xs font-bold bg-white/5 transition">
                        CLIENT 🎫
                    </button>
                    <button type="button" onclick="selectRole('partner')" id="role-partner" 
                        class="role-btn border border-white/10 py-3 rounded-xl text-xs font-bold bg-white/5 transition">
                        PARTENAIRE 🚀
                    </button>
                </div>
                <input type="hidden" id="signup-role" value="client">
            </div>
            <button type="submit" class="neon-btn w-full py-4 rounded-xl mt-4">
                CRÉER MON COMPTE
            </button>
        </form>

        <!-- FORMULAIRE : MOT DE PASSE OUBLIÉ -->
        <form id="reset-form" class="space-y-5 hidden">
            <div class="text-center mb-6">
                <i class="fas fa-key text-4xl text-primary mb-3"></i>
                <p class="text-text-secondary text-sm">Saisissez votre email pour recevoir un lien de réinitialisation.</p>
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-secondary uppercase">Email ou Téléphone</label>
                <input type="text" id="reset-id" required placeholder="Email ou +242..." 
                    class="neon-input w-full px-4 py-3 rounded-xl outline-none text-sm">
            </div>
            <button type="submit" class="neon-btn w-full py-4 rounded-xl mt-4">
                ENVOYER LE CODE
            </button>
            <div class="text-center">
                <button type="button" onclick="switchTab('login')" class="text-xs text-text-secondary hover:text-white">Retour à la connexion</button>
            </div>
        </form>

        <!-- Toasts d'erreurs/succès -->
        <div id="toast" class="hidden absolute -top-16 left-0 right-0 bg-error/90 p-4 rounded-xl text-xs font-bold text-center animate-bounce">
            Message d'erreur ici.
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { login, signup, resetPassword } from './js/auth-firebase.js';

        // Particules de fond
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.setProperty('--duration', (Math.random() * 5 + 3) + 's');
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
            p.style.animationDelay = (Math.random() * 5) + 's';
            particlesContainer.appendChild(p);
        }

        // Switch Onglets
        window.switchTab = (tab) => {
            ['login', 'signup', 'reset'].forEach(t => {
                const form = document.getElementById(`${t}-form`);
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    form.classList.remove('hidden');
                    btn.classList.add('active');
                    form.classList.add('animate-slide-up');
                } else {
                    form.classList.add('hidden');
                    btn.classList.remove('active');
                }
            });
        };

        // Sélection Rôle
        window.selectRole = (role) => {
            document.getElementById('signup-role').value = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active', 'border-primary', 'text-primary');
                if (btn.id === `role-${role}`) {
                    btn.classList.add('border-primary', 'text-primary');
                }
            });
        };

        // Gestion Toasts
        function showToast(msg, isSuccess = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `absolute -top-16 left-0 right-0 p-4 rounded-xl text-xs font-bold text-center ${isSuccess ? 'bg-primary text-dark' : 'bg-error text-white'}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 4000);
        }

        // Submit Connexion
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            
            // Exception Hardcoded pour Super Admin
            if (email === '+242064488892' || email === '064448892') {
                window.location.href = 'super-admin.html';
                return;
            }

            const res = await login(email, pass);
            if (!res.success) showToast(res.message);
        });

        // Submit Inscription
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-pass').value;
            const name = document.getElementById('signup-name').value;
            const phone = document.getElementById('signup-phone').value;
            const role = document.getElementById('signup-role').value;

            if (pass.length < 8) {
                showToast("Mot de passe : 8 caractères minimum.");
                return;
            }

            const res = await signup(email, pass, name, phone, role);
            if (!res.success) showToast(res.message);
            else showToast("Compte créé avec succès ! 🎉", true);
        });

        // Submit Reset
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-id').value;
            if (!email.includes('@')) {
                showToast("SMS non dispo en démo. Utilisez votre email.");
                return;
            }
            const res = await resetPassword(email);
            if (res.success) showToast("Lien de réinitialisation envoyé par email !", true);
            else showToast(res.message);
        });
    </script>

    <style>
        .role-btn.active {
            border-color: var(--primary) !important;
            color: var(--primary) !important;
            background: rgba(0, 255, 136, 0.05);
        }
    </style>
</body>
</html>
