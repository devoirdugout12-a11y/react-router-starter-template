  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

    /* Splash screen pendant le chargement Flutter */
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0D0D1A 0%, #1A0A3E 50%, #0D0D1A 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #6C3EE8, #AB6FF8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      margin-bottom: 16px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .splash-sub {
      color: #B0B3C8;
      font-size: 14px;
      margin-bottom: 40px;
    }

    .splash-loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(108, 62, 232, 0.2);
      border-top-color: #6C3EE8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .splash-flags {
      margin-top: 24px;
      font-size: 24px;
      animation: bounce 1s ease-in-out infinite alternate;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-8px); }
    }
  </style>

  <script>
    // Cacher le splash quand Flutter est prêt
    window.addEventListener('flutter-first-frame', function() {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 600);
      }
    });
  </script>
